<!DOCTYPE html>
<html>
<head>
  <title>Graph Visualizer</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>

<h1>Graph Visualizer</h1>

<div class="input-box">
<label>Nodes:</label>
<input type="number" id="nodes" value="5"><br>  
<label>Start Node:</label>
<input type="number" id="startNode" value="0"><br>

<label>Edges (u v weight per line):</label><br>
<textarea id="edges">0 1 4
0 2 2
1 3 5
2 4 3</textarea><br>

<button onclick="buildGraph()">Build Graph</button>
</div>

<div id="controls">
  <button onclick="runBFS()">BFS</button>
  <button onclick="runDFS()">DFS</button>
  <button onclick="runDijkstra()">Dijkstra</button>
  <button onclick="resetGraph()">Reset</button>
  
  
</div>

<div id="network"></div>

<script src="script.js"></script>
</body>
</html>
